<div class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-100 flex items-center justify-center p-8">
  <div class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl p-10 space-y-8">

    <!-- Título -->
    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 text-center">

    <p class="text-gray-700 text-center text-lg md:text-xl">

          <div class="bg-blue-500 h-4 rounded-full" style="width:82.16%"></div>

      <div>
        <div class="flex justify-between mb-1">

        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span class="font-semibold text-gray-700">Swin</span>
          <span class="text-gray-600">82.96%</span>

          <div class="bg-blue-500 h-4 rounded-full" style="width:82.96%"></div>

    <!-- Ensamblaje de modelos -->
    <div class="mt-8 text-center">
