<form
  autocomplete="off"
  [formGroup]="myForm"
  class="flex flex-col md:flex-row gap-x-6"
>
  <!-- Izquierda: área de carga -->
  <div class="flex-1 flex justify-center items-center w-full h-full">
    <div
      class="upload-area border-3 border-dashed border-blue-400 rounded-2xl p-10 mb-6 bg-blue-50/50 hover:border-blue-500 hover:bg-blue-50 transition-all duration-300 cursor-pointer text-center group hover:-translate-y-1"
      (click)="fileInput.click()"
    >
      <div
        class="text-5xl text-blue-400 mb-4 group-hover:scale-110 transition-transform duration-300"
      >
        📸
      </div>
      <div class="text-lg font-semibold text-gray-700 mb-2">
        {{ 'UPLOAD_IMAGE_TITLE' | translate }}
      </div>
      <div class="text-sm text-gray-500">
        {{ 'UPLOAD_IMAGE_DESCRIPTION' | translate }}
      </div>
    </div>
    <input
      #fileInput
      type="file"
      id="fileInput"
      accept="image/*"
      (change)="onFileSelected($event)"
      style="display: none"
    />
  </div>
  <!-- Derecha: vista previa + botón -->
  @if (myForm.value.imagen && imagePreviewUrl){
  <div class="flex-1 flex justify-center items-center w-full h-full">
    <div class="text-right">
      <img
        [src]="imagePreviewUrl"
        class="w-[224px] h-[224px] object-cover shadow-lg mb-4"
        alt="Vista previa"
      />
      <button
        type="button"
        class="analyze-btn w-full max-w-xs bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-semibold py-4 px-8 rounded-full text-lg transition-all duration-300 hover:-translate-y-1 hover:shadow-xl shadow-red-500/30"
        (click)="analyzeImage()"
      >
        {{ 'ANALYZE_BUTTON' | translate }}
      </button>
    </div>
  </div>
  }
</form>
